name: N0kernels 2.4 Build (SM8250) Bank

on:
  workflow_dispatch:
    inputs:
      CODENAME:
        description: 'Mã máy (munch, alioth, umi, lmi)'
        default: 'munch'
        required: true
      ROOT_CHOICE:
        description: 'Chọn bản Root muốn build'
        type: choice
        default: 'KSU_Next'
        options:
          - KSU_Next
          - SukiSU_Ultra
          - RKSU
          - No_Root
      KERNEL_TREE:
        description: "Link Kernel Source"
        default: "https://github.com/Impqxr/kernel_xiaomi_sm8250"
        required: true
      KERNEL_TREE_BRANCH:
        description: "Nhánh (Branch)"
        default: "base-bpf"
        required: true
      PRIMARY_CLANG_URL:
        description: "Clang chính (AOSP Clang)"
        default: "https://github.com/Impqxr/aosp_clang_ci/releases/download/13289611/clang-13289611-linux-x86.tar.xz"
        required: true
      FALLBACK_CLANG_URL:
        description: "Clang dự phòng (nếu cái trên lỗi)"
        default: "https://github.com/kdrag0n/proton-clang.git"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cài đặt công cụ Build & Fix libncurses
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex g++-multilib gcc-multilib git gnupg gperf libncurses-dev lib32readline-dev lib32z1-dev liblz4-tool libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 curl ccache
          # Hỗ trợ libncurses cho môi trường Ubuntu mới
          sudo apt install -y libncurses6 || sudo apt install -y libncursesw5 || true
          [ ! -f /usr/lib/x86_64-linux-gnu/libncurses.so.5 ] && sudo ln -s /usr/lib/x86_64-linux-gnu/libncurses.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5 || true
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Tải Toolchain (Hybrid Clang)
        run: |
          mkdir -p $GITHUB_WORKSPACE/clang
          echo "Đang thử tải Clang chính từ AOSP CI..."
          if wget "${{ github.event.inputs.PRIMARY_CLANG_URL }}" -O clang.tar.xz; then
            tar -xf clang.tar.xz -C $GITHUB_WORKSPACE/clang --strip-components=1 || {
              echo "Giải nén lỗi, chuyển sang Clang dự phòng (Proton)..."
              rm -rf $GITHUB_WORKSPACE/clang/*
              git clone --depth=1 ${{ github.event.inputs.FALLBACK_CLANG_URL }} $GITHUB_WORKSPACE/clang
            }
          else
            echo "Tải Clang lỗi, đang kích hoạt Clang dự phòng (Proton)..."
            git clone --depth=1 ${{ github.event.inputs.FALLBACK_CLANG_URL }} $GITHUB_WORKSPACE/clang
          fi

      - name: Tải Kernel Source
        run: |
          git clone --depth=1 ${{ github.event.inputs.KERNEL_TREE }} -b ${{ github.event.inputs.KERNEL_TREE_BRANCH }} kernel_tree

      - name: Tích hợp Root & Hardened Patches (Bank Bypass)
        working-directory: kernel_tree
        run: |
          # 1. Tích hợp Root dựa trên lựa chọn
          case "${{ github.event.inputs.ROOT_CHOICE }}" in
            "KSU_Next")
              curl -LSsf "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/legacy/kernel/setup.sh" | bash -s legacy
              ;;
            "SukiSU_Ultra")
              curl -LSsf "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main
              ;;
            "RKSU")
              curl -LSsf "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash
              ;;
          esac

          # 2. Bank Bypass: Patch Bootloader Status triệt để
          find fs/proc/ -name "cmdline.c" -exec sed -i 's/orange/green/g' {} + || true
          find drivers/soc/qcom/ -name "smem.c" -exec sed -i 's/androidboot.verifiedbootstate/androidboot.strong_state/g' {} + || true
          find drivers/soc/qcom/ -name "smem.c" -exec sed -i 's/androidboot.flash.locked/androidboot.strong.locked/g' {} + || true
          
          # 3. Obfuscation (Đổi tên định danh KernelSU)
          if [ "${{ github.event.inputs.ROOT_CHOICE }}" != "No_Root" ]; then
            find . -type f -name "*.c" -exec sed -i 's/KernelSU/strongSU/g' {} + || true
            find . -type f -name "*.c" -exec sed -i 's/ksud/strongd/g' {} + || true
          fi
          
          # 4. Branding
          sed -i 's/^EXTRAVERSION =.*/EXTRAVERSION = -strong-N0kernel/g' Makefile

      - name: Build Kernel (A11 - A16 Support)
        working-directory: kernel_tree
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          export ARCH=arm64
          export KBUILD_BUILD_USER="${{ github.actor }}"
          export KBUILD_BUILD_HOST="github.com"
          
          make O=out vendor/${{ github.event.inputs.CODENAME }}_defconfig
          
          # Ép config cho HyperOS/A15/A16
          scripts/config --file out/.config -d LTO -d LTO_CLANG -d THINLTO -e INIT_STACK_NONE
          [ "${{ github.event.inputs.ROOT_CHOICE }}" != "No_Root" ] && scripts/config --file out/.config -e KSU -e KSU_NEXT
          
          make -j$(nproc --all) O=out \
                      CC="clang" \
                      CROSS_COMPILE=aarch64-linux-gnu- \
                      CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                      LLVM=1 LLVM_IAS=1 \
                      KCFLAGS="-O3 -w -fno-builtin -mno-global-merge"

      - name: Đóng gói AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          cd AnyKernel3
          sed -i "s/device.name1=maguro/device.name1=${{ github.event.inputs.CODENAME }}/g" anykernel.sh
          
          # Patch trạng thái bootloader khi flash qua Recovery
          sed -i '/## AnyKernel install/a \
          dump_boot;\
          patch_cmdline "androidboot.verifiedbootstate" "androidboot.verifiedbootstate=green";\
          patch_cmdline "androidboot.flash.locked" "androidboot.flash.locked=1";\
          write_boot;' anykernel.sh
          
          cp ../kernel_tree/out/arch/arm64/boot/Image .
          [ -f ../kernel_tree/out/arch/arm64/boot/dtbo.img ] && cp ../kernel_tree/out/arch/arm64/boot/dtbo.img .
          [ -f ../kernel_tree/out/arch/arm64/boot/dtb.img ] && cp ../kernel_tree/out/arch/arm64/boot/dtb.img ./dtb
          
          ZIP_NAME="N0-Bank-${{ github.event.inputs.CODENAME }}-${{ github.event.inputs.ROOT_CHOICE }}.zip"
          zip -r9 "../$ZIP_NAME" * -x .git README.md
          echo "ZIP_FINAL=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_FINAL }}
          name: N0-Bank-Build-${{ github.event.inputs.CODENAME }}
          tag_name: Build-${{ github.run_id }}
          body: |
            ### Build Info
            - **Device:** ${{ github.event.inputs.CODENAME }}
            - **Root:** ${{ github.event.inputs.ROOT_CHOICE }}
            - **Android:** 11 - 16 (HyperOS/AOSP/MIUI)
            - **Clang:** Hybrid Logic (AOSP/Proton)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Tự động xóa cache & dọn dẹp bộ nhớ
        if: always()
        run: |
          rm -rf kernel_tree
          rm -rf AnyKernel3
          rm -rf clang
          echo "Dọn dẹp hoàn tất để tránh tràn dung lượng GitHub."
