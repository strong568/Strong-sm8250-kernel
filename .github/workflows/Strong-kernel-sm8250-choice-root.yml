name: Build Kernel strong-sm8250 choice root susfs

on:
  workflow_dispatch:
    inputs:
      CODENAME:
        description: 'Mã máy (munch, alioth, umi, lmi)'
        type: choice
        default: 'munch'
        options: [munch, alioth, umi, lmi]
      ROOT_CHOICE:
        description: 'Chọn loại Root'
        type: choice
        default: 'KSU_Next'
        options: [KSU_Next, SukiSU_Ultra, RKSU, No_Root]
      USE_SUSFS:
        description: 'Tích hợp SUSFS (Ẩn Root siêu cấp)'
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-22.04
    name: Build strong (${{ github.event.inputs.ROOT_CHOICE }}${{ github.event.inputs.USE_SUSFS && ' + SUSFS' || '' }})
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex g++-multilib gcc-multilib git gnupg gperf libncurses-dev lib32readline-dev lib32z1-dev liblz4-tool libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 curl ccache
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          sudo apt install -y libncurses5

      - name: Install Proton Clang
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git $GITHUB_WORKSPACE/clang

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 https://github.com/EmanuelCN/kernel_xiaomi_sm8250 -b staging $GITHUB_WORKSPACE/kernel
          cd $GITHUB_WORKSPACE/kernel
          echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: Integrate Root & SUSFS
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          # 1. Cài đặt Root
          case "${{ github.event.inputs.ROOT_CHOICE }}" in
            "KSU_Next"|"RKSU")
              curl -LSsf "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next
              ;;
            "SukiSU_Ultra")
              curl -LSsf "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main
              ;;
          esac

          # 2. Xử lý SUSFS (Bypass Git Auth 128 bằng ZIP)
          if [ "${{ github.event.inputs.USE_SUSFS }}" = "true" ]; then
            cd $GITHUB_WORKSPACE
            mkdir -p susfs_source && cd susfs_source
            curl -L https://github.com/rifsxd/susfs4ksu/archive/refs/heads/next.zip -o susfs.zip
            unzip -q susfs.zip
            SUSFS_DIR="$GITHUB_WORKSPACE/susfs_source/susfs4ksu-next"
            
            cd $GITHUB_WORKSPACE/kernel
            cp $SUSFS_DIR/kernel/include/linux/susfs.h include/linux/
            cp $SUSFS_DIR/kernel/fs/susfs.c fs/
            
            # Patch KernelSU Drivers
            if [ -d "drivers/kernelsu" ]; then
              cd drivers/kernelsu
              patch -p1 < $SUSFS_DIR/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch || echo "KSU patch failed"
              cd ../..
            fi
            
            # 3. Manual SED Patch (Cấu trúc Kernel 4.19 SM8250)
            echo "[+] Applying manual system patches..."
            sed -i '/filename = getname(filename_user);/a #ifdef CONFIG_SUSFS\n	if (current->susfs_task_state & SUSFS_TASK_STATE_BIT_IS_SUS_ID) {\n		if (!IS_ERR(filename)) {\n			susfs_is_sus_path(filename->name);\n		}\n	}\n#endif' fs/open.c
            sed -i '/error = vfs_getattr(&path, stat, request_mask, query_flags);/i #ifdef CONFIG_SUSFS\n	if (current->susfs_task_state & SUSFS_TASK_STATE_BIT_IS_SUS_ID) {\n		susfs_is_sus_path(path.dentry->d_name.name);\n	}\n#endif' fs/stat.c
            if ! grep -q "susfs_task_state" include/linux/sched.h; then
              sed -i '/struct task_struct {/,/};/ s/};/\n#ifdef CONFIG_SUSFS\n	uint32_t susfs_task_state;\n#endif\n};/' include/linux/sched.h
            fi
          fi

      - name: Patch Bank Bypass (Strong Edition)
        run: |
          cd $GITHUB_WORKSPACE/kernel
          # Fake trạng thái bootloader và bảo mật
          find fs/proc/ -name "cmdline.c" -exec sed -i 's/orange/green/g' {} + || true
          find drivers/soc/qcom/ -name "smem.c" -exec sed -i 's/androidboot.verifiedbootstate/androidboot.strong_state/g' {} + || true
          # Đổi tên nhận diện KernelSU để tránh bị app phát hiện chuỗi văn bản
          find . -type f -name "*.c" -exec sed -i 's/KernelSU/strongSU/g' {} + || true
          sed -i "s/^EXTRAVERSION =.*/EXTRAVERSION = -strong-${{ github.event.inputs.ROOT_CHOICE }}/g" Makefile

      - name: Build Kernel
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          cd $GITHUB_WORKSPACE/kernel
          export ARCH=arm64
          
          # Fix Makefile & LTO
          find . -type f -name "Makefile*" -exec sed -i 's/-regalloc-enable-advisor=release//g' {} + || true
          
          make O=out vendor/${{ github.event.inputs.CODENAME }}_defconfig
          
          # Ghi cấu hình Kernel (.config)
          scripts/config --file out/.config -d LTO -d LTO_CLANG -d THINLTO -e INIT_STACK_NONE
          if [ "${{ github.event.inputs.ROOT_CHOICE }}" != "No_Root" ]; then
            scripts/config --file out/.config -e KSU -e KSU_NEXT
            [ "${{ github.event.inputs.USE_SUSFS }}" = "true" ] && scripts/config --file out/.config -e SUSFS -e SUSFS_ROOT_PATH_SPOOF -e SUSFS_HIDE_KSU_FILES
          fi
          
          yes "" | make O=out oldconfig
          make -j$(nproc --all) O=out CC="ccache clang" CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- HOSTCFLAGS="-O2 -w" KCFLAGS="-O3 -w -fno-builtin"

      - name: Package & Sign (AnyKernel3)
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 $GITHUB_WORKSPACE/AnyKernel3
          cd $GITHUB_WORKSPACE/AnyKernel3
          sed -i 's/device.name1=maguro/device.name1=${{ github.event.inputs.CODENAME }}/g' anykernel.sh
          
          # UI thông báo trong Recovery
          sed -i "/### AnyKernel setup/a ui_print \" \"; ui_print \"  -> strong Kernel Applied!\"; ui_print \"  -> Root: ${{ github.event.inputs.ROOT_CHOICE }}\"; ui_print \"  -> SUSFS: ${{ github.event.inputs.USE_SUSFS && 'Active' || 'None' }}\";" anykernel.sh
          
          cp $GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image .
          ZIP_NAME="strong-${{ github.event.inputs.CODENAME }}-${{ github.event.inputs.ROOT_CHOICE }}.zip"
          zip -r9 "../$ZIP_NAME" * -x .git README.md
          
          # Ký file ZIP
          cd ..
          curl -L https://github.com/Magisk-Modules-Alt-Repo/zipsigner/raw/master/bin/zipsigner.jar -o zipsigner.jar
          java -jar zipsigner.jar "$ZIP_NAME" "${ZIP_NAME%.zip}-signed.zip"
          echo "ZIP_FINAL=${ZIP_NAME%.zip}-signed.zip" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ZIP_FINAL }}
          name: strong Kernel [${{ github.event.inputs.CODENAME }}]
          tag_name: strong-${{ github.event.inputs.CODENAME }}-${{ github.run_id }}
          body: |
            ### 🛠 Thông tin bản build
            - **Thiết bị:** `${{ github.event.inputs.CODENAME }}`
            - **Loại Root:** `${{ github.event.inputs.ROOT_CHOICE }}`
            - **SUSFS:** `${{ github.event.inputs.USE_SUSFS && 'Đã bật' || 'Tắt' }}`
            - **Kernel Commit:** `${{ env.COMMIT_HASH }}`
            - **Thời gian:** `${{ env.BUILD_TIME }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
