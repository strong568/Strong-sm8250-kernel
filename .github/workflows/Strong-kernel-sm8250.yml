name: Build Kernel strong-sm8250

on:
  workflow_dispatch:
    inputs:
      CODENAME:
        description: 'Select Phone Codename'
        type: choice
        default: 'munch'
        options: [munch, alioth, umi, lmi]
        required: true
      KERNEL_TREE:
        description: 'Kernel Tree URL'
        default: 'https://github.com/EmanuelCN/kernel_xiaomi_sm8250'
        required: true
      KERNEL_TREE_BRANCH:
        description: 'Kernel Tree Branch'
        default: 'staging'
        required: true

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        root_option: [KSU_Next, SukiSU_Ultra, RKSU, No_Root]

    name: Build strong (${{ matrix.root_option }})
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex g++-multilib gcc-multilib git gnupg gperf libncurses-dev lib32readline-dev lib32z1-dev liblz4-tool libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 curl ccache
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          sudo apt install -y libncurses5

      - name: Setup CCache
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: ccache-${{ github.event.inputs.CODENAME }}-${{ matrix.root_option }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ github.event.inputs.CODENAME }}-${{ matrix.root_option }}-

      - name: Install Proton Clang
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git $GITHUB_WORKSPACE/clang

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 ${{ github.event.inputs.KERNEL_TREE }} -b ${{ github.event.inputs.KERNEL_TREE_BRANCH }} $GITHUB_WORKSPACE/kernel
          cd $GITHUB_WORKSPACE/kernel
          echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Integrate Root Solution
        run: |
          cd $GITHUB_WORKSPACE/kernel
          case "${{ matrix.root_option }}" in
            "KSU_Next")
              curl -LSsf "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/main/kernel/setup.sh" | bash -s main || exit 1
              ;;
            "SukiSU_Ultra")
              curl -LSsf "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main || exit 1
              ;;
            "RKSU")
              curl -LSsf "https://raw.githubusercontent.com/rsuntk/RKSU/main/setup.sh" | bash || exit 1
              ;;
          esac
          
      - name: Patch Kernel (Bank Bypass Edition)
        run: |
          cd $GITHUB_WORKSPACE/kernel
          # 1. Ẩn trạng thái Unlocked
          find fs/proc/ -name "cmdline.c" -exec sed -i 's/orange/green/g' {} + || true
          find drivers/soc/qcom/ -name "smem.c" -exec sed -i 's/androidboot.verifiedbootstate/androidboot.strong_state/g' {} + || true
          find drivers/soc/qcom/ -name "smem.c" -exec sed -i 's/androidboot.flash.locked/androidboot.strong.locked/g' {} + || true
          
          # 2. Ẩn dấu vết Root/KSU
          find . -type f -name "*.c" -exec sed -i 's/KernelSU/strongSU/g' {} + || true
          find . -type f -name "*.c" -exec sed -i 's/ksud/strongd/g' {} + || true
          sed -i 's/magisk/strong_hide/g' net/ipv4/tcp_ipv4.c || true
          
          # 3. Branding
          sed -i 's/^EXTRAVERSION =.*/EXTRAVERSION = -strong-edition/g' Makefile
          echo "::notice::Super Bank Patch Applied!"

      - name: Build Kernel
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          export USE_CCACHE=1
          export CCACHE_DIR=/home/runner/.ccache
          ccache -M 5G
          
          cd $GITHUB_WORKSPACE/kernel
          export ARCH=arm64
          export KBUILD_BUILD_USER="strong568"
          export KBUILD_BUILD_HOST="strong-machine"

          # Đặc trị lỗi '-O3' tại scripts/mod (Phẫu thuật triệt để)
          find . -type f -name "Makefile*" -exec sed -i 's/-regalloc-enable-advisor=release//g' {} + || true
          find . -type f -name "Makefile*" -exec sed -i 's/-mllvm -polly//g' {} + || true
          if [ -f scripts/mod/Makefile ]; then
              sed -i 's/HOSTCFLAGS_empty.o := $(LTO_CFLAGS)//g' scripts/mod/Makefile
              sed -i 's/HOSTCFLAGS_mk_elfconfig.o := $(LTO_CFLAGS)//g' scripts/mod/Makefile
              sed -i '/_CFLAGS/s/-O3/-O2/g' scripts/mod/Makefile || true
          fi

          make O=out vendor/${{ github.event.inputs.CODENAME }}_defconfig
          scripts/config --file out/.config -d ARM64_LSE_ATOMICS -d LTO -d LTO_CLANG -d THINLTO -e INIT_STACK_NONE
          
          if [ "${{ matrix.root_option }}" != "No_Root" ]; then
             scripts/config --file out/.config -e KSU -e KSU_NEXT
          fi
          
          make O=out olddefconfig
          make -j$(nproc --all) O=out \
                      CC="ccache clang" \
                      CROSS_COMPILE=aarch64-linux-gnu- \
                      CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                      AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
                      LD=ld.lld \
                      CLANG_TRIPLE=aarch64-linux-gnu- \
                      HOSTCFLAGS="-O2 -w" \
                      KCFLAGS="-O3 -w -fno-builtin -mno-global-merge"

      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 $GITHUB_WORKSPACE/AnyKernel3
          cd $GITHUB_WORKSPACE/AnyKernel3
          
          # Cấu hình nhận diện vùng và ROM
          sed -i '/### AnyKernel setup/a \
          region="$(file_getprop /vendor/build.prop "ro.vendor.miui.build.region")" \
          if [ -z "$region" ]; then \
            region="$(file_getprop /product/etc/build.prop "ro.miui.build.region")" \
          fi \
          case "$region" in \
            cn|in|ru|id|eu|tr|tw|gb|global|mx|jp|kr|lm|cl|mi) \
                ui_print "  -> MIUI/HyperOS Detected!"; \
                ui_print "  -> Bank Bypass Patches Applied!"; \
              ;; \
            *) \
                ui_print "  -> AOSP ROM Detected!"; \
                ui_print "  -> Bank Bypass Patches Applied!"; \
              ;; \
          esac' anykernel.sh

          sed -i 's/device.name1=maguro/device.name1=${{ github.event.inputs.CODENAME }}/g' anykernel.sh
          sed -i 's/device.name2=toro/device.name2=munchin/g' anykernel.sh
          
          cp $GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image .
          [ -f $GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/dtbo.img ] && cp $GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/dtbo.img .
          [ -f $GITHUB_WORKSPACE/kernel/out/vendor_boot.img ] && cp $GITHUB_WORKSPACE/kernel/out/vendor_boot.img .

          ZIP_NAME="strong-${{ github.event.inputs.CODENAME }}-${{ matrix.root_option }}.zip"
          zip -r9 "../$ZIP_NAME" * -x .git README.md
          
          cd ..
          md5sum "$ZIP_NAME" > "$ZIP_NAME.md5"
          echo "ZIP_FINAL=$ZIP_NAME" >> $GITHUB_ENV
          echo "MD5_FINAL=$ZIP_NAME.md5" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.ZIP_FINAL }}
            ${{ env.MD5_FINAL }}
          name: strong Kernel - ${{ github.event.inputs.CODENAME }}
          tag_name: strong-${{ github.event.inputs.CODENAME }}-${{ github.run_id }}
          body: |
            ## strong Kernel for ${{ github.event.inputs.CODENAME }}
            - **Developer:** strong568
            - **Root:** ${{ matrix.root_option }}
            - **Commit:** ${{ env.COMMIT_HASH }}
            - **Bypass:** Bank & Bootloader Hide Patches applied.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: |
          rm -rf $GITHUB_WORKSPACE/kernel/out
          rm -rf $GITHUB_WORKSPACE/AnyKernel3
